<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parables & Platters · Shisanyama</title>
  <!-- Poppins & subtle fire / soul vibe -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome for subtle icons (optional but adds richness) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f; /* deep charcoal */
      color: #f5f2e8;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== NICE HEADER ===== */
    .soul-header {
      background: linear-gradient(145deg, #1e1a14 0%, #2b241c 100%);
      border-bottom: 2px solid #d4af37;
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand-main {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .brand-main span {
      color: #d4af37; /* gold */
      font-style: italic;
    }

    .brand-tagline {
      font-size: 0.9rem;
      font-weight: 300;
      color: #c0b28a;
      margin-top: -5px;
      letter-spacing: 1px;
    }

    .shisanyama-badge {
      background: #b87c4b;
      color: #0f0f0f;
      font-weight: 700;
      padding: 0.5rem 1.3rem;
      border-radius: 40px;
      font-size: 1.4rem;
      border: 2px solid #efc580;
      box-shadow: 0 0 15px #ffb34780;
      text-transform: uppercase;
    }

    /* ===== CONTAINER + VERTICAL MENU CARDS ===== */
    .main-container {
      flex: 1;
      max-width: 1300px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      width: 100%;
    }

    .menu-section-title {
      font-size: 2rem;
      font-weight: 600;
      border-left: 8px solid #d4af37;
      padding-left: 1.2rem;
      margin-bottom: 2rem;
      color: #f5e7c8;
      text-shadow: 2px 2px 0 #00000040;
    }

    .menu-grid {
      display: flex;
      flex-direction: column;  /* VERTICAL MENU CARDS */
      gap: 1.4rem;
    }

    /* individual menu card – unique style */
    .menu-card {
      background: #1d1a15;
      border-radius: 28px;
      padding: 1.2rem 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #4a3f33;
      box-shadow: 0 15px 25px -10px black;
      transition: all 0.2s ease;
      backdrop-filter: blur(2px);
    }

    .menu-card:hover {
      border-color: #d4af37;
      transform: scale(1.01) translateY(-3px);
      background: #262016;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      min-width: 200px;
    }

    .card-info h3 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #fadfad;
      letter-spacing: 0.5px;
    }

    .card-desc {
      font-size: 0.9rem;
      color: #aa9f87;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-desc i {
      color: #b48b5a;
      width: 18px;
    }

    .price-tag {
      font-size: 2rem;
      font-weight: 700;
      color: #e6c273;
      display: flex;
      align-items: center;
      gap: 5px;
      background: #2e281f;
      padding: 0.2rem 1rem;
      border-radius: 60px;
      border: 1px solid #6a5d48;
    }

    .price-tag small {
      font-size: 1rem;
      font-weight: 300;
      color: #bba88b;
    }

    /* UNIQUE ORDERING ON EACH CARD */
    .card-order-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #2b241c;
      padding: 0.3rem 0.8rem 0.3rem 1.2rem;
      border-radius: 40px;
      border: 1px solid #5f4f39;
    }

    .item-qty {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .item-qty button {
      background: #3e3529;
      border: none;
      color: #fadfad;
      width: 30px;
      height: 30px;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #7a684e;
    }

    .item-qty button:hover {
      background: #d4af37;
      color: #1d1a15;
      border-color: #fff2c0;
    }

    .qty-num {
      font-size: 1.3rem;
      font-weight: 600;
      min-width: 30px;
      text-align: center;
      color: #f5d98f;
    }

    .add-unique-btn {
      background: #d4af37;
      border: none;
      color: #1a150e;
      font-weight: 700;
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #f5cf6e;
      box-shadow: 0 4px 10px #d4af3730;
    }

    .add-unique-btn:hover {
      background: #edc867;
      transform: scale(1.05);
    }

    /* ===== NICE CART / FOOTER ===== */
    .nice-footer {
      background: #13110e;
      border-top: 3px solid #c9a449;
      padding: 1.5rem 2rem 1rem;
      margin-top: 2rem;
      box-shadow: 0 -10px 30px #00000080;
    }

    .cart-panel {
      max-width: 1300px;
      margin: 0 auto;
    }

    .cart-header {
      display: flex;
      align-items: center;
      gap: 15px;
      color: #e6c273;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
    }

    .cart-header i {
      background: #2f281f;
      padding: 12px;
      border-radius: 50%;
    }

    #cart-items {
      background: #1f1b16;
      border-radius: 30px;
      padding: 1.2rem 1.8rem;
      min-height: 80px;
      color: #f0dbc0;
      font-size: 1rem;
      border: 1px dashed #7b6b52;
      margin-bottom: 1.2rem;
      line-height: 1.8;
    }

    .cart-summary {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: #1e1913;
      border-radius: 50px;
      padding: 0.8rem 2rem;
      margin-bottom: 1.5rem;
    }

    .total-amount {
      font-size: 2rem;
      font-weight: 700;
      color: #fad874;
    }

    .total-amount span {
      font-size: 1.2rem;
      color: #b8a27b;
      font-weight: 400;
    }

    .checkout-form {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1 1 180px;
      background: #2d271f;
      border: 1px solid #5b4d36;
      border-radius: 40px;
      padding: 0.8rem 1.2rem;
      color: white;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: 0.2s;
    }

    .input-field:focus {
      border-color: #d4af37;
      background: #342d23;
    }

    .input-field::placeholder {
      color: #a19178;
      font-weight: 300;
    }

    .btn-checkout {
      background: #2b8f4c;
      border: none;
      padding: 0.9rem 2.2rem;
      border-radius: 40px;
      font-weight: 700;
      color: white;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border: 1px solid #5cb85c;
      transition: 0.2s;
      box-shadow: 0 5px 15px #1f9940a0;
    }

    .btn-checkout:hover {
      background: #36a85e;
      transform: scale(1.02);
    }

    .footer-note {
      text-align: center;
      margin-top: 2rem;
      color: #7a6f5b;
      font-size: 0.9rem;
      border-top: 1px solid #3b3328;
      padding-top: 1rem;
    }

    /* Firestore sync note (UI only, simulation) */
    .sync-badge {
      display: inline-flex;
      align-items: center;
      background: #313131;
      border-radius: 30px;
      padding: 0.2rem 1rem 0.2rem 0.7rem;
      color: #b9aa8b;
      gap: 6px;
      border: 1px solid #5f5340;
    }

    /* responsive */
    @media (max-width: 750px) {
      .menu-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      .card-order-area {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <!-- NICE HEADER : Parables & Platters / Shisanyama -->
  <header class="soul-header">
    <div class="brand">
      <div class="brand-main">PARABLES <span>&</span> PLATTERS</div>
      <div class="brand-tagline"><i class="fas fa-dove"></i> feeding the soul · shisanyama fire</div>
    </div>
    <div class="shisanyama-badge">
      <i class="fas fa-fire"></i> SHISANYAMA
    </div>
  </header>

  <!-- MAIN BODY with VERTICAL MENU CARDS + unique ordering -->
  <main class="main-container">
    <h2 class="menu-section-title"><i class="fas fa-utensils" style="margin-right: 10px;"></i> braai · bread · blessings</h2>
    
    <div class="menu-grid" id="menuContainer">
      <!-- menu cards will be dynamically injected from javascript -->
    </div>

    <!-- hidden field / sync simulation note (firestore integration context) -->
    <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
      <span class="sync-badge"><i class="fas fa-cloud-sun" style="color:#d4af37;"></i> firestore sync · live</span>
    </div>
  </main>

  <!-- NICE FOOTER (CART + ORDER DETAILS) -->
  <footer class="nice-footer">
    <div class="cart-panel">
      <div class="cart-header">
        <i class="fas fa-basket-shopping"></i> 
        <span>your offering</span>
        <span style="flex:1; text-align:right; font-size: 1rem;" id="cart-counter">(0 items)</span>
      </div>

      <!-- Cart items display -->
      <div id="cart-items">
        <i class="fas fa-leaf" style="opacity:0.5;"></i> your basket is empty... add a parable plate
      </div>

      <!-- total + quick fields -->
      <div class="cart-summary">
        <div class="total-amount">
          <span>total</span> R<span id="totalValue">0</span>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <input type="text" id="name" class="input-field" placeholder="🙏 your name">
          <input type="tel" id="phone" class="input-field" placeholder="📞 phone">
          <input type="text" id="address" class="input-field" placeholder="📍 delivery address">
        </div>
      </div>
      
      <!-- Checkout button + firestore hint -->
      <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
        <button class="btn-checkout" id="checkoutBtn"><i class="fas fa-scroll"></i> place order · soul fire</button>
        <span style="font-size:0.8rem; color:#7a6f5b;"><i class="fas fa-database"></i> auto-sync to Firestore (emulated)</span>
      </div>
      
      <div class="footer-note">
        <i class="fas fa-cross"></i> parables & platters — every meal feeds more than hunger <i class="fas fa-hands-praying"></i>
      </div>
    </div>
  </footer>

  <script>
    // ---------------------- FIREBASE / FIRESTORE INTEGRATION (simulated + ready) ----------------------
    // For demo, we use a mock but structure shows how you'd connect.
    // In real app, you'd import firebase. Here we simulate with localstorage + sync messages.
    
    // ** MENU DATA (enriched with parables / platters theme) **
    const menu = [
      { id: 'p1', name: '🐔 SPIRIT WINGS', description: 'soul-glazed chicken wings', basePrice: 60, price: 60, parable: 'generosity takes flight' },
      { id: 'p2', name: '🔥 SHISANYAMA PLATE', description: 'beef steak + pap / chakalaka', basePrice: 120, price: 120, parable: 'bread broken together' },
      { id: 'p3', name: '🍔 THE GOOD SAMARITAN BURGER', description: 'beef patty, caramelized onion, holy cheese', basePrice: 50, price: 50, parable: 'share with a stranger' },
      { id: 'p4', name: '🍟 LOADED FRIES (parable style)', description: 'with brisket & garlic aioli', basePrice: 45, price: 45, parable: 'abundance' },
      { id: 'p5', name: '🥤 WELLSPRING DRINK', description: 'artisanal ginger beer / cold drink', basePrice: 20, price: 20, parable: 'living water' },
      { id: 'p6', name: '🍖 LAMB OF JOY', description: 'slow roasted lamb shank', basePrice: 140, price: 140, parable: 'peace' }
    ];

    // CART array (holds items with quantity)
    let cart = [];

    // ----- UNIQUE: each menu card has its own quantity selector (per item) -----
    // We'll store temporary quantities separately, not affecting cart until "add" clicked.
    // Create a map for quantities per menu index
    let itemQtys = new Array(menu.length).fill(1);  // default qty 1

    // Render all menu cards vertically
    function renderMenu() {
      const container = document.getElementById('menuContainer');
      let htmlStr = '';
      menu.forEach((item, idx) => {
        htmlStr += `
          <div class="menu-card" data-index="${idx}">
            <div class="card-info">
              <h3>${item.name}</h3>
              <div class="card-desc">
                <i class="fas fa-seedling"></i> ${item.description} · <span style="color:#b6995c;">${item.parable}</span>
              </div>
            </div>
            <div class="price-tag">
              R${item.price} <small>each</small>
            </div>
            <div class="card-order-area" data-index="${idx}">
              <div class="item-qty">
                <button class="qty-decr" data-index="${idx}">−</button>
                <span class="qty-num" id="qtyDisplay-${idx}">${itemQtys[idx]}</span>
                <button class="qty-incr" data-index="${idx}">+</button>
              </div>
              <button class="add-unique-btn" data-index="${idx}"><i class="fas fa-hand-holding-heart"></i> add to cart</button>
            </div>
          </div>
        `;
      });
      container.innerHTML = htmlStr;

      // Attach quantity button events
      document.querySelectorAll('.qty-incr').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = btn.dataset.index;
          itemQtys[idx] = (itemQtys[idx] || 1) + 1;
          document.getElementById(`qtyDisplay-${idx}`).innerText = itemQtys[idx];
        });
      });

      document.querySelectorAll('.qty-decr').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = btn.dataset.index;
          if (itemQtys[idx] > 1) {
            itemQtys[idx]--;
            document.getElementById(`qtyDisplay-${idx}`).innerText = itemQtys[idx];
          }
        });
      });

      // Unique add-to-cart per card (pushes item with current qty)
      document.querySelectorAll('.add-unique-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = btn.dataset.index;
          const qty = itemQtys[idx];
          const menuItem = menu[idx];
          // Add item multiple times? better store as object with quantity to keep cart tidy
          // But we want unique entries: we can combine same items? For simplicity we'll push as separate or combine
          // Let's combine if same id exists (update quantity)
          const existing = cart.find(item => item.id === menuItem.id);
          if (existing) {
            existing.quantity += qty;
          } else {
            cart.push({ 
              id: menuItem.id, 
              name: menuItem.name, 
              price: menuItem.price, 
              quantity: qty,
              parable: menuItem.parable
            });
          }
          // reset qty to 1 after adding (optional, friendly)
          itemQtys[idx] = 1;
          document.getElementById(`qtyDisplay-${idx}`).innerText = 1;

          // Update cart UI + FIRESTORE sync simulation
          updateCartUI();
          simulateFirestoreSync('add', menuItem);
        });
      });
    }

    // Update cart panel
    function updateCartUI() {
      const cartDiv = document.getElementById('cart-items');
      const totalSpan = document.getElementById('totalValue');
      const counterSpan = document.getElementById('cart-counter');
      if (!cart.length) {
        cartDiv.innerHTML = '<i class="fas fa-leaf" style="opacity:0.6;"></i> your basket is empty... add a parable plate';
        totalSpan.innerText = '0';
        counterSpan.innerText = '(0 items)';
        return;
      }

      let lines = '';
      let total = 0;
      let itemCount = 0;
      cart.forEach(item => {
        const sub = item.price * item.quantity;
        total += sub;
        itemCount += item.quantity;
        lines += `<i class="fas fa-utensil-spoon" style="color:#c1a05b;"></i> ${item.name} ×${item.quantity} — R${sub} <span style="color:#ad9e83; font-size:0.8rem;"> (${item.parable || 'blessing'})</span><br>`;
      });
      cartDiv.innerHTML = lines;
      totalSpan.innerText = total;
      counterSpan.innerText = `(${itemCount} item${itemCount>1?'s':''})`;
    }

    // Simulate Firestore sync (in real app: firebase.firestore().collection('orders')... add)
    function simulateFirestoreSync(action, item) {
      console.log(`🔥 FIRESTORE: ${action} -`, item);
      // In real integration you'd have:
      // db.collection("liveOrders").add({...cart, timestamp: firebase.firestore.FieldValue.serverTimestamp()})
      // For now we just show a subtle console log (UI shows sync badge)
      const syncMsg = document.querySelector('.sync-badge');
      if (syncMsg) {
        syncMsg.style.opacity = '0.7';
        syncMsg.innerHTML = '<i class="fas fa-cloud-upload-alt" style="color:#d4af37;"></i> synced · ' + new Date().toLocaleTimeString();
        setTimeout(() => {
          syncMsg.innerHTML = '<i class="fas fa-cloud-sun" style="color:#d4af37;"></i> firestore sync · live';
        }, 2000);
      }
    }

    // Checkout: validate, alert, then send to Firestore (simulated) and clear cart
    function handleCheckout() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();

      if (cart.length === 0) {
        alert('🕯️ your basket is empty — add a parable plate first.');
        return;
      }
      if (!name || !phone || !address) {
        alert('✋ please fill in all fields: name, phone, delivery address.');
        return;
      }

      // build order object
      const order = {
        customer: { name, phone, address },
        items: cart.map(i => ({ id: i.id, name: i.name, quantity: i.quantity, price: i.price })),
        total: cart.reduce((acc, i) => acc + (i.price * i.quantity), 0),
        timestamp: new Date().toISOString(),
        status: 'received (soul kitchen)'
      };

      // ---- FIRESTORE INTEGRATION (demo) ----
      console.log('📦 FIRESTORE: order placed', order);
      // In production: firebase.firestore().collection('orders').add(order).then(...)
      simulateFirestoreSync('ORDER PLACED', order);

      alert(`✅ Order placed, ${name}! Your food will be prepared. (Check console for Firestore simulation)`);

      // Clear cart
      cart = [];
      // reset qty displays? keep qtys as 1 (already some may be 1)
      menu.forEach((_, idx) => { itemQtys[idx] = 1; });
      // update displayed qtys
      menu.forEach((_, idx) => {
        const qtySpan = document.getElementById(`qtyDisplay-${idx}`);
        if (qtySpan) qtySpan.innerText = '1';
      });
      updateCartUI();
      // clear fields? optional
      // document.getElementById('name').value = ''; etc – but leave for convenience
    }

    // Initial load
    renderMenu();
    updateCartUI();

    // Checkout button event
    document.getElementById('checkoutBtn').addEventListener('click', handleCheckout);

    // additional: simulate initial Firestore listener (for UI)
    window.addEventListener('load', () => {
      // pretend we listen to firestore changes (passive)
      console.log('🔥 Firestore listener active (simulated) — real integration ready.');
    });

    // ---- firestore integration note: in real app you'd import Firebase and init:
    // const db = firebase.firestore();
    // db.collection("menu").onSnapshot(...) but we use static menu.
    // This structure shows how ordering and firestore sync would work.
  </script>
</body>
</html>
