<!DOCTYPE html>

<html lang="en">
  
<head>
  
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>CV-5 · DIRECT ACTION</title>
  <!-- fonts & icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Electrolize&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- circle favicon (simple inline) -->
  <link rel="icon" type="image/png" href="logo_tr.png" sizes="16x16">
  
  <style>
    
    /* ----- root compact (fixed missing comma, added dept) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #01030a;
      --panel: #071821;
      --accent: #00f0ff;
      --soft: #77faff;
      --ok: #00ff99;
      --warn: #ffaa00;
      --danger: #ff3355;
      --mono: 'VT323', monospace;
      --ui: 'Electrolize', sans-serif;
      --header-font: 'Orbitron', sans-serif;
      --header-h: 70px;
      --chip-border: rgba(0, 255, 255, 0.15);
      --glow-subtle: 0 0 15px rgba(0, 255, 255, 0.15);
    }

    html, body {
      height: 100%;
      font-family: var(--mono);
      background: var(--bg);
      color: var(--accent);
      overflow-x: hidden;
      overflow-y: auto;  /* normal scroll restored */
      scroll-behavior: smooth;
      scroll-padding-top: var(--header-h);
    }

    body.fade-out {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    canvas, img, video {
      display: block;
      max-width: 100%;
    }

    /* ----- matrix canvas (reduced opacity) ----- */
    #matrixCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.08;
      pointer-events: none;
    }

    /* ----- scanline (minimal) ----- */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0, 255, 255, 0.02) 3px);
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* ----- header (compact) ----- */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.95);
      border-bottom: 1px solid var(--accent);
      z-index: 1000;
    }

    header h1 {
      font-family: var(--header-font);
      letter-spacing: 4px;
      font-size: clamp(1rem, 2vw, 1.5rem);
      color: var(--accent);
    }

    /* ----- hero / chip (tightened) ----- */
    #hero {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      padding: var(--header-h) 15px 30px;
      margin-top: 50px;
    }

    #chip-container {
      position: relative;
      width: 400px;
      max-width: 80vw;
      height: 400px;
      background: rgba(5, 20, 28, 0.98);
      border: 1px solid var(--chip-border);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: hidden;
    }

    #binary-code {
      font-family: var(--header-font);
      font-size: clamp(1.5rem, 5vw, 3rem);
      letter-spacing: 4px;
      color: var(--accent);
      text-align: center;
      word-break: break-word;
      opacity: 0.9;
    }

    .chip-circuit {
      position: absolute;
      inset: 8px;
      border: 1px dashed var(--chip-border);
      pointer-events: none;
      border-radius: 20px;
    }

    .chip-circuit::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px dashed rgba(0, 255, 255, 0.05);
      transform: rotate(45deg);
      border-radius: 20px;
    }

    /* ----- section titles (compact) ----- */
    .section-title {
      text-align: center;
      font-family: var(--header-font);
      letter-spacing: 6px;
      margin: 30px 0 25px;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      scroll-margin-top: var(--header-h);
    }

    .section-title::before,
    .section-title::after {
      content: "⏤";
      margin: 0 10px;
      opacity: 0.4;
      font-size: 1.2rem;
    }

    /* ----- grid cards (compact) ----- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      padding: 0 20px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      background: rgba(7, 24, 33, 0.95);
      border: 1px solid rgba(0, 255, 255, 0.1);
      padding: 30px 20px;
      text-align: center;
      transition: all 0.2s ease;
      cursor: pointer;
      border-radius: 12px;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      background: rgba(10, 30, 38, 0.98);
    }

    .card i {
      font-size: 2.2rem;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .card h3 {
      font-family: var(--header-font);
      letter-spacing: 2px;
      font-size: 1.1rem;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    .enter-btn {
      padding: 8px 20px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      cursor: pointer;
      font-family: var(--ui);
      letter-spacing: 2px;
      font-size: 0.8rem;
      transition: 0.2s;
      border-radius: 5px;
    }

    .enter-btn:hover {
      background: var(--accent);
      color: #000;
    }

    /* ----- auth modal (compact) ----- */
    #authOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.98);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #authBox {
      background: #040b10;
      border: 1px solid var(--accent);
      padding: 40px 30px;
      max-width: 450px;
      width: 90%;
      text-align: center;
      border-radius: 15px;
    }

    #authBox h3 {
      font-family: var(--header-font);
      letter-spacing: 3px;
      font-size: 1.4rem;
      margin-bottom: 15px;
    }

    #authDept {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    #codeInput {
      width: 100%;
      padding: 15px;
      background: #000;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-align: center;
      letter-spacing: 4px;
      font-size: 1.5rem;
      margin: 20px 0;
      font-family: var(--header-font);
      border-radius: 8px;
    }

    #codeInput:focus {
      outline: none;
      border-color: var(--accent);
    }

    #authStatus {
      height: 24px;
      margin-bottom: 15px;
      font-size: 1rem;
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .auth-buttons .enter-btn {
      min-width: 100px;
      padding: 10px;
    }

    /* ----- footer HUD (compact) ----- */
    #data-footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.95);
      border-top: 1px solid rgba(0, 255, 255, 0.1);
      padding: 8px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      z-index: 100;
      font-family: var(--ui);
    }

    .threat-low { color: var(--ok); }
    .threat-high { color: var(--danger); }

    /* ----- responsive breakpoints (tight) ----- */
    @media (max-width: 768px) {
      :root { --header-h: 60px; }
      
      header h1 { letter-spacing: 2px; }
      
      #hero { min-height: 60vh; }
      
      #chip-container {
        width: 300px;
        height: 300px;
      }
      
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 0 15px 70px;
      }
      
      .card { padding: 20px 15px; }
      .card i { font-size: 1.8rem; }
      .card h3 { font-size: 1rem; }
      
      .section-title::before,
      .section-title::after {
        content: "";
        margin: 0 5px;
      }
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      
      #chip-container {
        width: 250px;
        height: 250px;
      }
      
      #binary-code { letter-spacing: 2px; }
      
      #data-footer {
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px;
        font-size: 0.5rem;
      }
      
      #authBox { padding: 25px 20px; }
      #codeInput { font-size: 1.2rem; padding: 12px; }
    }

    /* ----- reduced motion ----- */
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
      body::after { display: none; }
    }
    
  </style>
  
</head>
  
<body>

  <canvas id="matrixCanvas"></canvas>

  <header>
    <h1><a href="index.html" style="text-decoration: none; color: var(--accent);">CV-5 DIRECT ACTION</a></h1>
  </header>

  <main>
    <section id="hero">
      <div id="chip-container">
        <div class="chip-circuit"></div>
        <div id="binary-code">01000011 01010110 00101101 00110101</div>
      </div>
    </section>

    <h2 class="section-title">DEPARTMENTS</h2>
    <div class="grid" id="deptGrid"></div>
  </main>

  <div id="authOverlay">
    <div id="authBox">
      <h3>SECURE ACCESS</h3>
      <p id="authDept"></p>
      <input type="password" id="codeInput" placeholder="••••" maxlength="5" autocomplete="off">
      <div id="authStatus"></div>
      <div class="auth-buttons">
        <button class="enter-btn" onclick="verify()">AUTHORIZE</button>
        <button class="enter-btn" onclick="closeAuth()">ABORT</button>
      </div>
    </div>
  </div>

  <div id="data-footer">
    <span>OPERATOR: EDEN</span>
    <span id="clock"></span>
    <span id="threat" class="threat-low">THREAT: EVIL</span>
  </div>

  <script>
    
    (function() {
      // --- matrix rain (minimal) ---
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;

      function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      const chars = '01';
      const fontSize = 16;
      let columns, drops;

      function initMatrix() {
        columns = Math.floor(width / fontSize);
        drops = Array(columns).fill(1);
      }
      initMatrix();

      function drawMatrix() {
        ctx.fillStyle = 'rgba(1, 3, 9, 0.1)';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#00f0ff';
        ctx.font = fontSize + 'px monospace';
        
        for (let i = 0; i < drops.length; i++) {
          const char = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(char, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(drawMatrix, 40);

      window.addEventListener('resize', () => {
        resizeCanvas();
        initMatrix();
      });

      // --- departments data (fixed missing comma & duplicate id) ---
      const DEPARTMENTS = [
        { id: 'io', name: '01. INNOVATIONS', icon: 'fa-microchip', code: 'CIC01', file: 'innovations.html' },
        { id: 'ceo', name: '02. EXECUTIVE', icon: 'fa-suit', code: 'CEO02', file: 'ceo.html' },
        { id: 'sc', name: '03. SUPPLY CHAIN', icon: 'fa-truck-fast', code: 'SCT03', file: 'scl.html' },
        { id: 'cs', name: '04. COMPUTER SCIENCE', icon: 'fa-code', code: 'ZA32', file: 'compsci.html' },
        { id: 'br', name: '05. BRANDING', icon: 'fa-design', code: 'BR11', file: 'branding.html' },
        { id: 'comp', name: '06. COMPLIANCE', icon: 'fa-law', code: 'LAW33', file: 'compliance.html' }
      ];

      let activeDept = null;

      function renderDepts() {
        const grid = document.getElementById('deptGrid');
        grid.innerHTML = DEPARTMENTS.map(dept => `
          <div class="card" onclick="openAuth('${dept.id}')">
            <i class="fas ${dept.icon}"></i>
            <h3>${dept.name}</h3>
            <p>EDEN CLEARANCE</p>
            <button class="enter-btn">ENTER</button>
          </div>
        `).join('');
      }
      renderDepts();

      // --- auth functions (exposed globally) ---
      window.openAuth = (id) => {
        activeDept = DEPARTMENTS.find(d => d.id === id);
        document.getElementById('authDept').innerText = activeDept.name;
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('codeInput').value = '';
        document.getElementById('authStatus').innerText = '';
        document.getElementById('threat').className = 'threat-low';
        document.getElementById('threat').innerText = 'THREAT: EVIL';
        setTimeout(() => document.getElementById('codeInput').focus(), 50);
      };

      window.closeAuth = () => {
        document.getElementById('authOverlay').style.display = 'none';
        activeDept = null;
      };

      window.verify = () => {
        if (!activeDept) return;
        const input = document.getElementById('codeInput').value.trim().toUpperCase();
        const statusEl = document.getElementById('authStatus');
        const threatEl = document.getElementById('threat');
        
        if (input === activeDept.code) {
          statusEl.style.color = 'var(--ok)';
          statusEl.innerText = 'ACCESS GRANTED';
          threatEl.className = 'threat-low';
          threatEl.innerText = 'THREAT: EVIL';
          document.body.classList.add('fade-out');
          setTimeout(() => { window.location.href = activeDept.file; }, 500);
        } else {
          statusEl.style.color = 'var(--danger)';
          statusEl.innerText = 'ACCESS DENIED';
          threatEl.className = 'threat-high';
          threatEl.innerText = 'THREAT: HIGH';
          document.getElementById('codeInput').value = '';
          document.getElementById('codeInput').focus();
        }
      };

      // --- keyboard controls ---
      document.addEventListener('keydown', (e) => {
        const overlay = document.getElementById('authOverlay');
        if (e.key === 'Escape' && overlay.style.display === 'flex') {
          closeAuth();
        }
        if (e.key === 'Enter' && overlay.style.display === 'flex') {
          verify();
        }
      });

      // --- click outside to close modal ---
      document.getElementById('authOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'authOverlay') closeAuth();
      });

      // --- clock ---
      function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
      }
      setInterval(updateClock, 1000);
      updateClock();

      // --- right click disabled ---
      document.addEventListener('contextmenu', e => e.preventDefault());

      // --- normal scrolling (restored) ---
      // No custom wheel handler - using native scroll

    })();
    
  </script>
  
</body>
  
</html>
