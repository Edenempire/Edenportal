<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ALARM HUB · REAL NOTIFICATIONS</title>
  
  <!-- Critical for audio on mobile -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Electrolize&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    /* ----- ROOT COMPACT ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #01030a;
      --panel: #071821;
      --panel-light: #0f2a33;
      --accent: #00f0ff;
      --accent-dim: #00a0aa;
      --ok: #00ff99;
      --warn: #ffaa00;
      --danger: #ff3355;
      --mono: 'VT323', monospace;
      --ui: 'Electrolize', sans-serif;
      --header-font: 'Orbitron', sans-serif;
      --header-h: 70px;
      --border-subtle: rgba(0, 255, 255, 0.15);
    }

    html, body {
      height: 100%;
      font-family: var(--mono);
      background: var(--bg);
      color: var(--accent);
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ----- matrix background (ultra subtle) ----- */
    #matrixCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.05;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0, 255, 255, 0.01) 3px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ----- HEADER ----- */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(0, 0, 0, 0.98);
      border-bottom: 1px solid var(--accent);
      z-index: 1000;
      backdrop-filter: blur(8px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-left h1 {
      font-family: var(--header-font);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      letter-spacing: 2px;
    }

    .time-display {
      font-family: var(--header-font);
      font-size: 1.5rem;
      font-weight: 700;
      text-shadow: 0 0 10px var(--accent);
    }

    /* ----- MAIN CONTENT ----- */
    .main {
      padding: calc(var(--header-h) + 20px) 15px 80px;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* ----- CURRENT TIME CARD ----- */
    .current-time-card {
      background: rgba(7, 24, 33, 0.95);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 30px 20px;
      margin-bottom: 25px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0, 255, 255, 0.1);
    }

    .current-label {
      font-family: var(--ui);
      font-size: 0.9rem;
      opacity: 0.7;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .current-time {
      font-family: var(--header-font);
      font-size: 4.5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 5px;
      text-shadow: 0 0 15px var(--accent);
    }

    .current-date {
      font-size: 1.1rem;
      opacity: 0.8;
      letter-spacing: 2px;
    }

    /* ----- QUICK ADD ----- */
    .quick-add {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .quick-add input {
      flex: 1;
      background: rgba(7, 24, 33, 0.95);
      border: 1px solid var(--border-subtle);
      padding: 15px;
      color: var(--accent);
      font-family: var(--header-font);
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 4px;
      border-radius: 12px;
    }

    .quick-add input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .quick-add button {
      width: 60px;
      background: rgba(7, 24, 33, 0.95);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 12px;
      font-size: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .quick-add button:hover {
      background: var(--accent);
      color: #000;
    }

    /* ----- SECTION TITLE ----- */
    .section-title {
      font-family: var(--header-font);
      letter-spacing: 3px;
      font-size: 1.2rem;
      margin: 30px 0 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ----- ALARMS LIST ----- */
    .alarms-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 30px;
    }

    .alarm-item {
      background: rgba(7, 24, 33, 0.95);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.2s;
      cursor: move;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alarm-item.active {
      border-color: var(--accent);
      background: rgba(0, 255, 255, 0.05);
    }

    .alarm-time-block {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .alarm-time {
      font-family: var(--header-font);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .alarm-period {
      font-size: 0.9rem;
      opacity: 0.6;
    }

    .alarm-label {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .alarm-days {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }

    .day-badge {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-family: var(--ui);
      border: 1px solid transparent;
    }

    .day-badge.active {
      border-color: var(--accent);
      background: rgba(0, 255, 255, 0.2);
    }

    .alarm-controls {
      display: flex;
      gap: 8px;
    }

    .toggle-switch {
      width: 50px;
      height: 26px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-subtle);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: 0.2s;
    }

    .toggle-switch.active {
      background: rgba(0, 255, 255, 0.2);
      border-color: var(--accent);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }

    .toggle-switch.active::after {
      left: 26px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--accent);
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-icon:hover {
      border-color: var(--accent);
      background: rgba(0, 255, 255, 0.1);
    }

    .btn-icon.delete:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ----- ADD ALARM MODAL ----- */
    #alarmModal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.98);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: #040b10;
      border: 1px solid var(--accent);
      padding: 30px 25px;
      max-width: 400px;
      width: 90%;
      border-radius: 20px;
      animation: modalPop 0.3s ease;
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-content h2 {
      font-family: var(--header-font);
      text-align: center;
      margin-bottom: 25px;
      letter-spacing: 2px;
    }

    .time-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .time-picker input {
      width: 80px;
      background: #000;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--header-font);
      font-size: 2rem;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
    }

    .time-picker span {
      font-size: 2rem;
      opacity: 0.5;
    }

    .time-picker select {
      background: #000;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--header-font);
      font-size: 1.2rem;
      padding: 10px;
      border-radius: 12px;
    }

    .label-input {
      width: 100%;
      background: #000;
      border: 1px solid var(--border-subtle);
      color: var(--accent);
      font-family: var(--ui);
      font-size: 1rem;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .days-selector {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 25px;
    }

    .day-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--accent);
      padding: 12px 0;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--ui);
      transition: 0.2s;
    }

    .day-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-buttons button {
      flex: 1;
      padding: 15px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--ui);
      font-size: 1rem;
      letter-spacing: 2px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .modal-buttons button.save {
      background: var(--accent);
      color: #000;
    }

    /* ----- ALERT POPUP ----- */
    #alarmAlert {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.98);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }

    .alert-content {
      background: #040b10;
      border: 2px solid var(--danger);
      padding: 40px;
      text-align: center;
      border-radius: 30px;
      animation: alertPulse 1s infinite;
    }

    @keyframes alertPulse {
      0% { box-shadow: 0 0 20px var(--danger); }
      50% { box-shadow: 0 0 60px var(--danger); }
      100% { box-shadow: 0 0 20px var(--danger); }
    }

    .alert-content i {
      font-size: 5rem;
      color: var(--danger);
      margin-bottom: 20px;
    }

    .alert-content h2 {
      font-family: var(--header-font);
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: var(--danger);
    }

    .alert-content p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .alert-content button {
      padding: 15px 30px;
      background: var(--danger);
      border: none;
      color: #000;
      font-family: var(--header-font);
      font-size: 1.1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 700;
      min-width: 120px;
    }

    .alert-content button.snooze {
      background: var(--warn);
      color: #000;
    }

    /* ----- FOOTER ----- */
    #data-footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.98);
      border-top: 1px solid rgba(0, 255, 255, 0.1);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      z-index: 100;
      font-family: var(--ui);
    }

    /* Permission banner */
    #permissionBanner {
      background: rgba(255, 170, 0, 0.2);
      border: 1px solid var(--warn);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
      font-family: var(--ui);
      display: none;
    }

    #permissionBanner button {
      background: var(--warn);
      border: none;
      color: #000;
      padding: 8px 20px;
      border-radius: 20px;
      margin-left: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 480px) {
      .current-time { font-size: 3.5rem; }
      .alarm-time { font-size: 1.6rem; }
      .day-badge { width: 25px; height: 25px; }
      .time-picker input { width: 60px; font-size: 1.5rem; }
      .alert-content { padding: 25px; }
      .alert-content button { padding: 12px 20px; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <canvas id="matrixCanvas"></canvas>

  <header>
    <div class="header-left">
      <i class="fas fa-clock"></i>
      <h1>ALARM HUB</h1>
    </div>
    <div class="time-display" id="liveTime">00:00</div>
  </header>

  <div class="main">
    <!-- PERMISSION BANNER -->
    <div id="permissionBanner">
      <span>🔔 Enable notifications for real alarms</span>
      <button onclick="requestPermissions()">ENABLE</button>
    </div>

    <!-- CURRENT TIME CARD -->
    <div class="current-time-card">
      <div class="current-label">CURRENT TIME</div>
      <div class="current-time" id="currentTime">00:00:00</div>
      <div class="current-date" id="currentDate"></div>
    </div>

    <!-- QUICK ADD -->
    <div class="quick-add">
      <input type="text" id="quickTime" placeholder="HH:MM" maxlength="5">
      <button onclick="openAddModal()"><i class="fas fa-plus"></i></button>
    </div>

    <!-- ALARMS SECTION -->
    <div class="section-title">
      <i class="fas fa-bell"></i> YOUR ALARMS
    </div>
    <div class="alarms-list" id="alarmsList"></div>

    <!-- PRESETS SECTION -->
    <div class="section-title">
      <i class="fas fa-star"></i> PRESETS
    </div>
    <div class="alarms-list" id="presetsList"></div>
  </div>

  <!-- ADD/EDIT ALARM MODAL -->
  <div id="alarmModal">
    <div class="modal-content">
      <h2 id="modalTitle">ADD ALARM</h2>
      <div class="time-picker">
        <input type="number" id="alarmHour" min="1" max="12" value="7">
        <span>:</span>
        <input type="number" id="alarmMinute" min="0" max="59" value="0" step="10">
        <select id="alarmPeriod">
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
      <input type="text" id="alarmLabel" class="label-input" placeholder="Label (e.g., Wake up)" value="Morning Alarm">
      
      <div class="days-selector" id="daysSelector">
        <button class="day-btn" data-day="0">S</button>
        <button class="day-btn" data-day="1">M</button>
        <button class="day-btn" data-day="2">T</button>
        <button class="day-btn" data-day="3">W</button>
        <button class="day-btn" data-day="4">T</button>
        <button class="day-btn" data-day="5">F</button>
        <button class="day-btn" data-day="6">S</button>
      </div>

      <div class="modal-buttons">
        <button class="save" onclick="saveAlarm()">SAVE</button>
        <button onclick="closeModal()">CANCEL</button>
      </div>
    </div>
  </div>

  <!-- ALARM ALERT POPUP -->
  <div id="alarmAlert">
    <div class="alert-content">
      <i class="fas fa-bell fa-shake"></i>
      <h2 id="alertTitle">⏰ ALARM!</h2>
      <p id="alertMessage">Time to wake up</p>
      <div class="button-group">
        <button onclick="snoozeAlarm()" class="snooze">SNOOZE 5</button>
        <button onclick="dismissAlarm()">DISMISS</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="data-footer">
    <span>ALARMS: <span id="alarmCount">0</span> ACTIVE</span>
    <span id="clock"></span>
    <span>NEXT: <span id="nextAlarm">--:--</span></span>
  </div>

  <!-- REAL AUDIO ELEMENT (CRITICAL FOR MOBILE) -->
  <audio id="alarmSound" loop preload="auto" style="display: none;">
    <source src="data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8AEAAPABAADwAQAA8AEAAPABAADwAQAA8AEAAPABAADwAQAA8AEAAPABAADwAQAA8AEAAPABAADwAQAA8AAA=" type="audio/wav">
  </audio>

  <script>
    (function() {
      'use strict';

      // =========================================
      // MATRIX BACKGROUND
      // =========================================
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;

      function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      const chars = '01';
      const fontSize = 14;
      let columns, drops;

      function initMatrix() {
        columns = Math.floor(width / fontSize);
        drops = Array(columns).fill(1);
      }
      initMatrix();

      function drawMatrix() {
        ctx.fillStyle = 'rgba(1, 3, 9, 0.1)';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#00f0ff';
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
          const char = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(char, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(drawMatrix, 40);

      window.addEventListener('resize', () => {
        resizeCanvas();
        initMatrix();
      });

      // =========================================
      // PERMISSIONS & NOTIFICATIONS
      // =========================================
      const permissionBanner = document.getElementById('permissionBanner');
      
      window.requestPermissions = () => {
        // Request notification permission
        if ('Notification' in window) {
          Notification.requestPermission().then(perm => {
            if (perm === 'granted') {
              permissionBanner.style.display = 'none';
              // Test notification
              new Notification('✅ Alarms Ready', {
                body: 'You will now receive real notifications',
                icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%2300f0ff"/></svg>'
              });
            }
          });
        }

        // Request audio permissions (user interaction needed for mobile)
        const audio = document.getElementById('alarmSound');
        audio.play().then(() => {
          audio.pause();
          audio.currentTime = 0;
        }).catch(e => console.log('Audio needs user interaction'));
      };

      // Check permissions on load
      if ('Notification' in window) {
        if (Notification.permission === 'default') {
          permissionBanner.style.display = 'block';
        }
      }

      // =========================================
      // REAL AUDIO SYSTEM
      // =========================================
      const alarmAudio = document.getElementById('alarmSound');
      let audioEnabled = false;

      // Generate a proper alarm sound using Web Audio API as fallback
      function generateAlarmSound() {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          
          oscillator.type = 'sawtooth';
          oscillator.frequency.value = 440;
          
          gainNode.gain.value = 0.3;
          
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          
          // Create pattern
          oscillator.start();
          setTimeout(() => oscillator.stop(), 200);
          setTimeout(() => {
            const osc2 = audioContext.createOscillator();
            osc2.type = 'sawtooth';
            osc2.frequency.value = 880;
            osc2.connect(gainNode);
            osc2.start();
            setTimeout(() => osc2.stop(), 200);
          }, 250);
        } catch (e) {
          console.log('Web Audio not available, using fallback');
        }
      }

      window.playRealAlarm = () => {
        try {
          alarmAudio.loop = true;
          alarmAudio.volume = 0.8;
          
          // Create a more aggressive sound pattern
          const playPromise = alarmAudio.play();
          if (playPromise) {
            playPromise.catch(e => {
              console.log('Audio play failed, using Web Audio');
              generateAlarmSound();
            });
          }

          // Vibrate if supported (real hardware feedback)
          if ('vibrate' in navigator) {
            const vibrationPattern = [500, 200, 500, 200, 500];
            navigator.vibrate(vibrationPattern);
          }
        } catch (e) {
          generateAlarmSound();
        }
      };

      window.stopRealAlarm = () => {
        alarmAudio.pause();
        alarmAudio.currentTime = 0;
        if ('vibrate' in navigator) {
          navigator.vibrate(0);
        }
      };

      // =========================================
      // ALARM DATA
      // =========================================
      let alarms = [
        {
          id: '1',
          time: '07:00',
          period: 'AM',
          label: 'Morning Wake Up',
          days: [1, 2, 3, 4, 5],
          enabled: true,
          snooze: 5
        },
        {
          id: '2',
          time: '08:30',
          period: 'PM',
          label: 'Evening Meditation',
          days: [0, 6],
          enabled: false,
          snooze: 10
        }
      ];

      const presets = [
        {
          id: 'p1',
          time: '06:30',
          period: 'AM',
          label: 'Early Bird',
          days: [1, 2, 3, 4, 5],
          enabled: false
        },
        {
          id: 'p2',
          time: '22:00',
          period: 'PM',
          label: 'Bedtime',
          days: [1, 2, 3, 4, 5, 6, 0],
          enabled: false
        }
      ];

      let editingId = null;
      let activeAlarm = null;
      let snoozeTimeout = null;

      // =========================================
      // RENDER ALARMS
      // =========================================
      function renderAlarms() {
        const list = document.getElementById('alarmsList');
        list.innerHTML = alarms.map(alarm => `
          <div class="alarm-item ${alarm.enabled ? 'active' : ''}" data-id="${alarm.id}" draggable="true">
            <div style="flex:1">
              <div class="alarm-time-block">
                <span class="alarm-time">${alarm.time}</span>
                <span class="alarm-period">${alarm.period}</span>
              </div>
              <div class="alarm-label">${alarm.label}</div>
              <div class="alarm-days">
                ${renderDays(alarm.days)}
              </div>
            </div>
            <div class="alarm-controls">
              <div class="toggle-switch ${alarm.enabled ? 'active' : ''}" onclick="toggleAlarm('${alarm.id}')"></div>
              <button class="btn-icon" onclick="editAlarm('${alarm.id}')"><i class="fas fa-pen"></i></button>
              <button class="btn-icon delete" onclick="deleteAlarm('${alarm.id}')"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `).join('');

        document.getElementById('alarmCount').innerText = alarms.filter(a => a.enabled).length;
      }

      function renderPresets() {
        const list = document.getElementById('presetsList');
        list.innerHTML = presets.map(preset => `
          <div class="alarm-item">
            <div style="flex:1">
              <div class="alarm-time-block">
                <span class="alarm-time">${preset.time}</span>
                <span class="alarm-period">${preset.period}</span>
              </div>
              <div class="alarm-label">${preset.label}</div>
              <div class="alarm-days">
                ${renderDays(preset.days)}
              </div>
            </div>
            <div>
              <button class="btn-icon" onclick="usePreset('${preset.id}')"><i class="fas fa-plus"></i></button>
            </div>
          </div>
        `).join('');
      }

      function renderDays(days) {
        const allDays = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
        return allDays.map((day, index) => `
          <div class="day-badge ${days.includes(index) ? 'active' : ''}">${day}</div>
        `).join('');
      }

      // =========================================
      // ALARM CRUD OPERATIONS
      // =========================================
      window.toggleAlarm = (id) => {
        const alarm = alarms.find(a => a.id === id);
        if (alarm) {
          alarm.enabled = !alarm.enabled;
          renderAlarms();
          saveToStorage();
          checkNextAlarm();
        }
      };

      window.deleteAlarm = (id) => {
        if (confirm('Delete this alarm?')) {
          alarms = alarms.filter(a => a.id !== id);
          renderAlarms();
          saveToStorage();
          checkNextAlarm();
        }
      };

      window.editAlarm = (id) => {
        const alarm = alarms.find(a => a.id === id);
        if (alarm) {
          editingId = id;
          const [hours, minutes] = alarm.time.split(':');
          document.getElementById('alarmHour').value = parseInt(hours);
          document.getElementById('alarmMinute').value = parseInt(minutes);
          document.getElementById('alarmPeriod').value = alarm.period;
          document.getElementById('alarmLabel').value = alarm.label;
          
          document.querySelectorAll('.day-btn').forEach(btn => {
            const day = parseInt(btn.dataset.day);
            btn.classList.toggle('active', alarm.days.includes(day));
          });
          
          document.getElementById('modalTitle').innerText = 'EDIT ALARM';
          document.getElementById('alarmModal').style.display = 'flex';
        }
      };

      window.usePreset = (id) => {
        const preset = presets.find(p => p.id === id);
        if (preset) {
          const newAlarm = {
            ...preset,
            id: Date.now().toString(),
            enabled: true
          };
          alarms.push(newAlarm);
          renderAlarms();
          saveToStorage();
          checkNextAlarm();
        }
      };

      window.openAddModal = () => {
        editingId = null;
        document.getElementById('alarmHour').value = 7;
        document.getElementById('alarmMinute').value = 0;
        document.getElementById('alarmPeriod').value = 'AM';
        document.getElementById('alarmLabel').value = 'New Alarm';
        document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('modalTitle').innerText = 'ADD ALARM';
        document.getElementById('alarmModal').style.display = 'flex';
      };

      window.closeModal = () => {
        document.getElementById('alarmModal').style.display = 'none';
      };

      window.saveAlarm = () => {
        let hour = document.getElementById('alarmHour').value;
        let minute = document.getElementById('alarmMinute').value;
        const period = document.getElementById('alarmPeriod').value;
        const label = document.getElementById('alarmLabel').value;
        
        // Validate and format
        hour = hour.toString().padStart(2, '0');
        minute = minute.toString().padStart(2, '0');
        
        const days = [];
        document.querySelectorAll('.day-btn.active').forEach(btn => {
          days.push(parseInt(btn.dataset.day));
        });

        if (days.length === 0) {
          alert('Select at least one day');
          return;
        }

        const alarmData = {
          id: editingId || Date.now().toString(),
          time: `${hour}:${minute}`,
          period,
          label,
          days,
          enabled: true,
          snooze: 5
        };

        if (editingId) {
          alarms = alarms.map(a => a.id === editingId ? alarmData : a);
        } else {
          alarms.push(alarmData);
        }

        renderAlarms();
        saveToStorage();
        checkNextAlarm();
        closeModal();
      };

      // =========================================
      // DAY SELECTOR
      // =========================================
      document.querySelectorAll('.day-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          btn.classList.toggle('active');
        });
      });

      // =========================================
      // REAL TIME CLOCK
      // =========================================
      function updateClock() {
        const now = new Date();
        
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        
        document.getElementById('liveTime').innerText = `${hours}:${minutes}`;
        document.getElementById('currentTime').innerText = `${hours}:${minutes}:${seconds}`;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = now.toLocaleDateString('en-US', options);
        
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        
        checkActiveAlarms(now);
      }
      setInterval(updateClock, 1000);
      updateClock();

      // =========================================
      // REAL ALARM CHECKING
      // =========================================
      let lastTriggered = {};

      function checkActiveAlarms(now) {
        const currentHour = now.getHours();
        const currentMinute = now.getMinutes();
        const currentDay = now.getDay();
        const currentSeconds = now.getSeconds();
        
        // Check each enabled alarm
        alarms.forEach(alarm => {
          if (!alarm.enabled) return;
          
          // Skip if already triggered in last 60 seconds (prevents multiple triggers)
          const alarmKey = `${alarm.id}-${now.toDateString()}`;
          if (lastTriggered[alarmKey] && (Date.now() - lastTriggered[alarmKey]) < 60000) {
            return;
          }
          
          if (!alarm.days.includes(currentDay)) return;
          
          const [alarmHour, alarmMinute] = alarm.time.split(':');
          let alarmHour24 = parseInt(alarmHour);
          
          if (alarm.period === 'PM' && alarmHour !== '12') {
            alarmHour24 += 12;
          } else if (alarm.period === 'AM' && alarmHour === '12') {
            alarmHour24 = 0;
          }
          
          // Trigger at exact minute (within 2 seconds)
          if (alarmHour24 === currentHour && parseInt(alarmMinute) === currentMinute && currentSeconds < 2) {
            triggerRealAlarm(alarm);
            lastTriggered[alarmKey] = Date.now();
          }
        });
      }

      window.triggerRealAlarm = (alarm) => {
        if (activeAlarm) {
          // If another alarm triggers while one is active, queue it
          setTimeout(() => triggerRealAlarm(alarm), 30000);
          return;
        }
        
        activeAlarm = alarm;
        document.getElementById('alertTitle').innerHTML = '⏰ ALARM!';
        document.getElementById('alertMessage').innerText = `${alarm.label} • ${alarm.time} ${alarm.period}`;
        document.getElementById('alarmAlert').style.display = 'flex';
        
        // REAL sound
        playRealAlarm();
        
        // REAL notification
        if ('Notification' in window && Notification.permission === 'granted') {
          const notification = new Notification('⏰ ALARM!', {
            body: `${alarm.label} - ${alarm.time} ${alarm.period}`,
            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23ff3355"/></svg>',
            tag: 'alarm',
            requireInteraction: true,
            silent: false
          });
          
          notification.onclick = () => {
            window.focus();
            notification.close();
          };
        }
      };

      window.dismissAlarm = () => {
        document.getElementById('alarmAlert').style.display = 'none';
        stopRealAlarm();
        
        if (snoozeTimeout) {
          clearTimeout(snoozeTimeout);
          snoozeTimeout = null;
        }
        
        activeAlarm = null;
      };

      window.snoozeAlarm = () => {
        document.getElementById('alarmAlert').style.display = 'none';
        stopRealAlarm();
        
        if (activeAlarm) {
          const snoozeMinutes = activeAlarm.snooze || 5;
          const snoozeTime = Date.now() + (snoozeMinutes * 60 * 1000);
          
          if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(`⏰ Snoozed for ${snoozeMinutes} min`, {
              body: activeAlarm.label,
              icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23ffaa00"/></svg>'
            });
          }
          
          snoozeTimeout = setTimeout(() => {
            triggerRealAlarm(activeAlarm);
          }, snoozeMinutes * 60 * 1000);
          
          activeAlarm = null;
        }
      };

      // =========================================
      // NEXT ALARM CALCULATION
      // =========================================
      function checkNextAlarm() {
        const now = new Date();
        let nextAlarmTime = null;
        let minDiff = Infinity;

        alarms.filter(a => a.enabled).forEach(alarm => {
          alarm.days.forEach(day => {
            const alarmDate = new Date();
            const dayDiff = (day - now.getDay() + 7) % 7;
            alarmDate.setDate(now.getDate() + dayDiff);
            
            const [hour, minute] = alarm.time.split(':');
            let alarmHour24 = parseInt(hour);
            
            if (alarm.period === 'PM' && hour !== '12') {
              alarmHour24 += 12;
            } else if (alarm.period === 'AM' && hour === '12') {
              alarmHour24 = 0;
            }
            
            alarmDate.setHours(alarmHour24, parseInt(minute), 0, 0);
            
            if (dayDiff === 0 && alarmDate <= now) {
              alarmDate.setDate(alarmDate.getDate() + 7);
            }
            
            const diff = alarmDate - now;
            if (diff > 0 && diff < minDiff) {
              minDiff = diff;
              nextAlarmTime = `${alarm.time} ${alarm.period}`;
            }
          });
        });

        document.getElementById('nextAlarm').innerText = nextAlarmTime || '--:--';
      }

      // =========================================
      // LOCAL STORAGE
      // =========================================
      function saveToStorage() {
        localStorage.setItem('realAlarms', JSON.stringify(alarms));
      }

      function loadFromStorage() {
        const saved = localStorage.getItem('realAlarms');
        if (saved) {
          try {
            alarms = JSON.parse(saved);
          } catch (e) {
            console.log('Failed to load alarms');
          }
        }
      }

      // =========================================
      // DRAG TO REORDER
      // =========================================
      let draggedItem = null;
      
      document.addEventListener('dragstart', (e) => {
        if (e.target.classList.contains('alarm-item')) {
          draggedItem = e.target;
          e.target.style.opacity = '0.5';
        }
      });

      document.addEventListener('dragend', (e) => {
        if (e.target.classList.contains('alarm-item')) {
          e.target.style.opacity = '1';
        }
      });

      document.addEventListener('dragover', (e) => e.preventDefault());

      document.addEventListener('drop', (e) => {
        e.preventDefault();
        if (draggedItem && e.target.closest('.alarm-item')) {
          const target = e.target.closest('.alarm-item');
          const draggedId = draggedItem.dataset.id;
          const targetId = target.dataset.id;
          
          if (draggedId && targetId && draggedId !== targetId) {
            const draggedIndex = alarms.findIndex(a => a.id === draggedId);
            const targetIndex = alarms.findIndex(a => a.id === targetId);
            
            const [draggedAlarm] = alarms.splice(draggedIndex, 1);
            alarms.splice(targetIndex, 0, draggedAlarm);
            
            renderAlarms();
            saveToStorage();
          }
        }
      });

      // =========================================
      // QUICK ADD
      // =========================================
      document.getElementById('quickTime').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const time = e.target.value.trim();
          if (time.match(/^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/)) {
            const [hours, minutes] = time.split(':');
            const hour12 = ((parseInt(hours) + 11) % 12 + 1).toString().padStart(2, '0');
            const period = parseInt(hours) >= 12 ? 'PM' : 'AM';
            
            document.getElementById('alarmHour').value = hour12;
            document.getElementById('alarmMinute').value = minutes;
            document.getElementById('alarmPeriod').value = period;
            document.getElementById('alarmLabel').value = 'Quick Alarm';
            document.querySelectorAll('.day-btn').forEach(btn => {
              btn.classList.toggle('active', [1,2,3,4,5].includes(parseInt(btn.dataset.day)));
            });
            document.getElementById('modalTitle').innerText = 'ADD ALARM';
            document.getElementById('alarmModal').style.display = 'flex';
          }
        }
      });

      // =========================================
      // INITIALIZATION
      // =========================================
      loadFromStorage();
      renderAlarms();
      renderPresets();
      checkNextAlarm();

      // Auto-check permissions
      if (Notification.permission === 'default') {
        setTimeout(() => {
          permissionBanner.style.display = 'block';
        }, 2000);
      }

      // Cleanup on unload
      window.addEventListener('beforeunload', () => {
        stopRealAlarm();
      });

      // Click outside modal
      document.getElementById('alarmModal').addEventListener('click', (e) => {
        if (e.target.id === 'alarmModal') closeModal();
      });

      document.getElementById('alarmAlert').addEventListener('click', (e) => {
        if (e.target.id === 'alarmAlert') dismissAlarm();
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeModal();
          if (document.getElementById('alarmAlert').style.display === 'flex') {
            dismissAlarm();
          }
        }
      });

      // Enable audio on first user interaction
      document.body.addEventListener('click', function enableAudio() {
        alarmAudio.load();
        document.body.removeEventListener('click', enableAudio);
      }, { once: true });

      // Expose functions globally
      window.toggleAlarm = toggleAlarm;
      window.deleteAlarm = deleteAlarm;
      window.editAlarm = editAlarm;
      window.usePreset = usePreset;
      window.openAddModal = openAddModal;
      window.closeModal = closeModal;
      window.saveAlarm = saveAlarm;
      window.dismissAlarm = dismissAlarm;
      window.snoozeAlarm = snoozeAlarm;
      window.requestPermissions = requestPermissions;

      // Initialize
      console.log('✅ REAL ALARM SYSTEM ACTIVE');
    })();
  </script>
</body>
</html>
