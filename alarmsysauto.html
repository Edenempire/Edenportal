<!DOCTYPE html>

<html lang="en">
  
<head>
  
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  
  <title>ALARM SYSTEM AUTOMATION</title>
  <!-- mobile web app capable + fullscreen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <!-- fonts: clean, readable -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700;14..32,900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- icons (minimal) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- favicon -->
  <link rel="icon" type="image/png" href="logo.png">
  
  <style>
    
    /* ---------- RESET ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---------- GLOBAL: NO GLOW, FLAT, DARK, MAX CONTRAST ---------- */
    :root {
      --bg: #000000;
      --surface: #0a0c10;
      --border: #2a3a44;
      --accent: #00eaff;
      --accent-dim: #007788;
      --warn: #ffbb00;
      --danger: #ff3b3b;
      --text: #e0f0ff;
      --font-main: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'Roboto Mono', monospace;
      --header-h: 80px;
      --footer-h: 70px;
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      line-height: 1.4;
      /* no shadows/glow */
      text-shadow: none;
      box-shadow: none;
    }

    /* ---------- GRID: HEADER CENTERED, MAIN CENTERED, FOOTER ALWAYS VISIBLE ---------- */
    body {
      display: grid;
      grid-template-rows: var(--header-h) 1fr var(--footer-h);
      grid-template-columns: 1fr min(98%, 750px) 1fr;
      grid-template-areas:
        "header header header"
        ". main ."
        "footer footer footer";
      align-items: start;
      justify-items: stretch;
      overflow-y: auto;
    }

    /* ---------- HEADER (CENTERED CONTENT) ---------- */
    header {
      grid-area: header;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
    }
    /* left part (icon + system name) */
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(1.2rem, 4vw, 1.9rem);
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* ---------- MAIN (centered column) ---------- */
    .main {
      grid-area: main;
      width: 100%;
      padding: 20px 0 25px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .main > * {
      width: 100%;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    /* cards flat */
    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 32px;
      padding: 28px 22px;
    }

    /* current time card */
    .current-time-card {
      text-align: center;
    }
    .current-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 5px;
      color: #9ab0c0;
    }
    .current-time {
      font-family: var(--font-mono);
      font-size: 5.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin: 8px 0 4px;
      color: var(--accent);
    }
    .current-date {
      font-size: 1.3rem;
      color: #b0c8da;
    }

    /* quick add */
    .quick-add {
      display: flex;
      gap: 12px;
    }
    .quick-add input {
      flex: 1;
      background: #0a0c10;
      border: 2px solid var(--border);
      border-radius: 60px;
      padding: 18px 25px;
      font-family: var(--font-mono);
      font-size: 1.8rem;
      color: var(--accent);
      text-align: center;
      letter-spacing: 4px;
    }
    .quick-add input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .quick-add button {
      width: 85px;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--accent);
      border-radius: 60px;
      font-size: 2.8rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .quick-add button:hover {
      background: var(--accent);
      color: black;
      border-color: var(--accent);
    }

    /* alarm sound selector (new) */
    .sound-selector-panel {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 60px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      margin: 10px 0 5px;
    }
    .sound-selector-panel span {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--accent);
    }
    .sound-options {
      display: flex;
      gap: 20px;
    }
    .sound-option {
      display: flex;
      align-items: center;
      gap: 8px;
      background: black;
      padding: 8px 24px;
      border-radius: 60px;
      border: 2px solid var(--border);
      cursor: pointer;
    }
    .sound-option input[type="radio"] {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      background: black;
      cursor: pointer;
    }
    .sound-option input[type="radio"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .sound-option label {
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* section titles */
    .section-title {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--border);
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
    }

    /* alarm list */
    .alarms-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .alarm-item {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 40px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: grab;
    }
    .alarm-item.active {
      border-color: var(--accent);
      background: #0f1a24;
    }
    .alarm-time-block {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .alarm-time {
      font-family: var(--font-mono);
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--accent);
    }
    .alarm-period {
      font-size: 1.2rem;
      color: #7f9faf;
      margin-left: 4px;
    }
    .alarm-label {
      font-size: 1.3rem;
      margin: 6px 0 10px;
    }
    .alarm-days {
      display: flex;
      gap: 10px;
    }
    .day-badge {
      width: 38px;
      height: 38px;
      border-radius: 30px;
      background: #000000;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .day-badge.active {
      background: var(--accent);
      border-color: var(--accent);
      color: black;
    }
    .alarm-controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .toggle-switch {
      width: 64px;
      height: 34px;
      background: #1e2a32;
      border: 2px solid var(--border);
      border-radius: 34px;
      position: relative;
      cursor: pointer;
    }
    .toggle-switch.active {
      background: #004466;
      border-color: var(--accent);
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      background: #aaccff;
      border-radius: 28px;
      top: 1px;
      left: 2px;
      transition: 0.1s;
    }
    .toggle-switch.active::after {
      left: 30px;
      background: var(--accent);
    }
    .btn-icon {
      width: 48px;
      height: 48px;
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 1.4rem;
      cursor: pointer;
    }
    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-icon.delete:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* permission banner */
    #permissionBanner {
      background: #1f2c35;
      border: 2px solid var(--warn);
      border-radius: 60px;
      padding: 18px 28px;
      display: none;
      align-items: center;
      justify-content: space-between;
      font-size: 1.3rem;
      margin-bottom: 8px;
    }
    #permissionBanner button {
      background: var(--warn);
      border: none;
      padding: 12px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.2rem;
      cursor: pointer;
      color: black;
    }

    /* MODAL */
    #alarmModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    }
    .modal-content {
      background: #0e141a;
      border: 3px solid var(--accent);
      border-radius: 60px;
      padding: 40px 30px;
      max-width: 520px;
      width: 94%;
    }
    .modal-content h2 { font-size: 2.4rem; margin-bottom: 24px; text-align: center; }
    .time-picker { display: flex; gap: 8px; justify-content: center; margin-bottom: 25px; }
    .time-picker input {
      width: 100px; background: black; border: 2px solid var(--border); color: var(--accent);
      font-family: var(--font-mono); font-size: 3rem; text-align: center; padding: 8px; border-radius: 28px;
    }
    .time-picker span { font-size: 3rem; color: gray; }
    .time-picker select {
      background: black; border: 2px solid var(--border); color: var(--accent);
      font-size: 1.8rem; padding: 8px; border-radius: 30px;
    }
    .label-input { width:100%; background:black; border:2px solid var(--border); color:white; font-size:1.4rem; padding:16px; border-radius:40px; margin-bottom:24px; }
    .days-selector { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; margin-bottom:30px; }
    .day-btn {
      background:black; border:2px solid var(--border); color:var(--text); padding:16px 0; border-radius:30px;
      font-size:1.4rem; cursor:pointer;
    }
    .day-btn.active { background:var(--accent); color:black; border-color:var(--accent); }
    .modal-buttons { display:flex; gap:16px; }
    .modal-buttons button {
      flex:1; padding:18px; background:black; border:2px solid var(--accent); color:var(--accent);
      border-radius:60px; font-size:1.3rem; font-weight:bold; cursor:pointer;
    }
    .modal-buttons button.save { background:var(--accent); color:black; }

    /* ALERT POPUP */
    #alarmAlert {
      position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 6000;
    }
    .alert-content {
      background: #111b22; border: 4px solid var(--danger); border-radius: 80px; padding: 50px 30px;
      text-align: center; max-width: 600px; width: 94%;
    }
    .alert-content i { font-size: 7rem; color: var(--danger); margin-bottom: 20px; }
    .alert-content h2 { font-size: 4rem; color: var(--danger); }
    .alert-content p { font-size: 2rem; margin: 20px 0 30px; }
    .button-group { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .alert-content button {
      padding: 20px 30px; background: var(--danger); border: none; color: black; font-weight: 900;
      border-radius: 60px; font-size: 1.6rem; min-width: 160px; border: 2px solid white; cursor: pointer;
    }
    .alert-content button.snooze { background: var(--warn); color: black; }

    /* FOOTER — ALWAYS VISIBLE, PERSISTENT */
    #data-footer {
      grid-area: footer;
      background: var(--surface);
      border-top: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--accent);
    }

    /* no shadows anywhere */
    * { box-shadow: none !important; text-shadow: none !important; }

    /* responsive */
    @media (max-width: 550px) {
      .current-time { font-size: 4rem; }
      .sound-selector-panel { flex-direction: column; align-items: flex-start; }
      .alarm-time { font-size: 2rem; }
    }
    
  </style>
  
</head>
  
<body>

<header>
  <div class="header-left">ALARM SYSTEM AUTOMATION</div>
</header>

<div class="main">
  <!-- PERMISSION BANNER -->
  <div id="permissionBanner">
    <span>🔔 ALLOW NOTIFICATIONS + CUSTOM MP3</span>
    <button onclick="requestFullPermissions()">ENABLE</button>
  </div>

  <!-- CURRENT TIME CARD -->
  <div class="card current-time-card">
    <div class="current-label">CURRENT TIME</div>
    <div class="current-time" id="currentTime">00:00:00</div>
    <div class="current-date" id="currentDate"></div>
  </div>

  <!-- QUICK ADD -->
  <div class="quick-add">
    <input type="text" id="quickTime" placeholder="HH:MM" maxlength="5">
    <button onclick="openAddModal()"><i class="fas fa-plus"></i></button>
  </div>

  <!-- SOUND SELECTOR (your custom MP3s) -->
  <div class="sound-selector-panel">
    <span><i class="fas fa-music"></i> ALARM SOUND</span>
    <div class="sound-options">
      <div class="sound-option" onclick="document.getElementById('sound1').checked = true; window.selectedSound='alarm1.mp3'">
        <input type="radio" name="alarmSound" id="sound1" value="alarm1.mp3" checked> <label for="sound1">BEEPER 1</label>
      </div>
      <div class="sound-option" onclick="document.getElementById('sound2').checked = true; window.selectedSound='alarm2.mp3'">
        <input type="radio" name="alarmSound" id="sound2" value="alarm2.mp3"> <label for="sound2">BEEPER 2</label>
      </div>
    </div>
  </div>

  <!-- ALARMS SECTION -->
  <div class="section-title"><i class="fas fa-bell"></i> YOUR ALARMS (DRAG TO REORDER)</div>
  <div class="alarms-list" id="alarmsList"></div>

  <!-- PRESETS SECTION -->
  <div class="section-title"><i class="fas fa-star"></i> QUICK PRESETS</div>
  <div class="alarms-list" id="presetsList"></div>
</div>

<!-- FOOTER (always present) -->
<div id="data-footer">
  <span>🔔 <span id="alarmCount">0</span> ACTIVE</span>
  <span><span id="footerClock"></span></span>
  <span>⏩ NEXT <span id="nextAlarm">--:--</span></span>
</div>

<!-- ADD/EDIT MODAL -->
<div id="alarmModal">
  <div class="modal-content">
    <h2 id="modalTitle">➕ ADD ALARM</h2>
    <div class="time-picker">
      <input type="number" id="alarmHour" min="1" max="12" value="7">
      <span>:</span>
      <input type="number" id="alarmMinute" min="0" max="59" value="0" step="5">
      <select id="alarmPeriod"><option value="AM">AM</option><option value="PM">PM</option></select>
    </div>
    <input type="text" id="alarmLabel" class="label-input" placeholder="Label" value="My Alarm">
    <div class="days-selector" id="daysSelector">
      <button class="day-btn" data-day="0">S</button><button class="day-btn" data-day="1">M</button><button class="day-btn" data-day="2">T</button>
      <button class="day-btn" data-day="3">W</button><button class="day-btn" data-day="4">T</button><button class="day-btn" data-day="5">F</button>
      <button class="day-btn" data-day="6">S</button>
    </div>
    <div class="modal-buttons"><button class="save" onclick="saveAlarm()">SAVE</button><button onclick="closeModal()">CANCEL</button></div>
  </div>
</div>

<!-- ALARM TRIGGER POPUP -->
<div id="alarmAlert">
  <div class="alert-content">
    <i class="fas fa-bell fa-shake"></i>
    <h2 id="alertTitle">🔊 TIME'S UP!</h2>
    <p id="alertMessage">alarm</p>
    <div class="button-group">
      <button onclick="snoozeAlarm(5)" class="snooze">SNOOZE 5</button>
      <button onclick="snoozeAlarm(10)">SNOOZE 10</button>
      <button onclick="dismissAlarm()">DISMISS</button>
    </div>
  </div>
</div>

<!-- CUSTOM MP3 AUDIO ELEMENTS (point to your repo files) -->
<audio id="customAlarm1" loop preload="auto" style="display:none">
  <source src="audio/alarm1.mp3" type="audio/mpeg">
</audio>
<audio id="customAlarm2" loop preload="auto" style="display:none">
  <source src="audio/alarm2.mp3" type="audio/mpeg">
</audio>

<script>
  
  (function() {
    'use strict';

    // ---------- CUSTOM MP3 PLAYER ----------
    const alarmMp3_1 = document.getElementById('customAlarm1');
    const alarmMp3_2 = document.getElementById('customAlarm2');
    // default selected sound
    window.selectedSound = 'alarm1.mp3';  // 'alarm1.mp3' or 'alarm2.mp3'

    // radio sync
    document.getElementById('sound1').addEventListener('change', (e) => { if(e.target.checked) window.selectedSound = 'alarm1.mp3'; });
    document.getElementById('sound2').addEventListener('change', (e) => { if(e.target.checked) window.selectedSound = 'alarm2.mp3'; });

    function playSelectedAlarm() {
      // stop both
      alarmMp3_1.pause(); alarmMp3_1.currentTime = 0;
      alarmMp3_2.pause(); alarmMp3_2.currentTime = 0;
      // play chosen
      if (window.selectedSound === 'alarm1.mp3') {
        alarmMp3_1.volume = 1.0;
        alarmMp3_1.play().catch(e => console.log('MP3 1 blocked, fallback'));
      } else {
        alarmMp3_2.volume = 1.0;
        alarmMp3_2.play().catch(e => console.log('MP3 2 blocked, fallback'));
      }
      // vibration
      if ('vibrate' in navigator) navigator.vibrate([600, 200, 600, 200, 600]);
    }

    function stopAlarmSound() {
      alarmMp3_1.pause(); alarmMp3_1.currentTime = 0;
      alarmMp3_2.pause(); alarmMp3_2.currentTime = 0;
      if ('vibrate' in navigator) navigator.vibrate(0);
    }

    // ---------- PERMISSIONS ----------
    window.requestFullPermissions = () => {
      if ('Notification' in window) {
        Notification.requestPermission().then(p => {
          if (p === 'granted') document.getElementById('permissionBanner').style.display = 'none';
        });
      }
      // attempt to unlock audio
      alarmMp3_1.play().then(() => { alarmMp3_1.pause(); alarmMp3_1.currentTime = 0; }).catch(()=>{});
      alarmMp3_2.play().then(() => { alarmMp3_2.pause(); alarmMp3_2.currentTime = 0; }).catch(()=>{});
    };

    // ---------- DATA (local storage CRUD) ----------
    let alarms = [];
    const presets = [
      { id:'pA', time:'06:30', period:'AM', label:'WAKE UP', days:[1,2,3,4,5], enabled:false },
      { id:'pB', time:'12:00', period:'PM', label:'LUNCH', days:[1,2,3,4,5,6,0], enabled:false },
      { id:'pC', time:'18:00', period:'PM', label:'WORKOUT', days:[1,2,3,4,5], enabled:false }
    ];

    function loadFromStorage() {
      const stored = localStorage.getItem('AlarmSystemAutomation');
      if (stored) { try { alarms = JSON.parse(stored); } catch { alarms = []; } }
      else {
        alarms = [
          { id:'a1', time:'07:00', period:'AM', label:'MORNING', days:[1,2,3,4,5], enabled:true, snooze:5 },
          { id:'a2', time:'21:30', period:'PM', label:'NIGHT', days:[0,1,2,3,4,5,6], enabled:false, snooze:5 }
        ];
      }
    }
    function saveToStorage() { localStorage.setItem('AlarmSystemAutomation', JSON.stringify(alarms)); }

    // ---------- RENDER ----------
    function renderDays(days) {
      const d = ['S','M','T','W','T','F','S'];
      return d.map((l,i)=>`<div class="day-badge ${days.includes(i)?'active':''}">${l}</div>`).join('');
    }
    function renderAlarms() {
      const container = document.getElementById('alarmsList');
      container.innerHTML = alarms.map(a => `
        <div class="alarm-item ${a.enabled?'active':''}" data-id="${a.id}" draggable="true">
          <div><div class="alarm-time-block"><span class="alarm-time">${a.time}</span><span class="alarm-period">${a.period}</span></div>
          <div class="alarm-label">${a.label}</div><div class="alarm-days">${renderDays(a.days)}</div></div>
          <div class="alarm-controls">
            <div class="toggle-switch ${a.enabled?'active':''}" onclick="toggleAlarm('${a.id}')"></div>
            <button class="btn-icon" onclick="editAlarm('${a.id}')"><i class="fas fa-pen"></i></button>
            <button class="btn-icon delete" onclick="deleteAlarm('${a.id}')"><i class="fas fa-trash"></i></button>
          </div>
        </div>`).join('');
      document.getElementById('alarmCount').innerText = alarms.filter(a=>a.enabled).length;
    }
    function renderPresets() {
      const container = document.getElementById('presetsList');
      container.innerHTML = presets.map(p => `
        <div class="alarm-item"><div><div class="alarm-time-block"><span class="alarm-time">${p.time}</span><span class="alarm-period">${p.period}</span></div>
        <div class="alarm-label">${p.label}</div><div class="alarm-days">${renderDays(p.days)}</div></div>
        <div><button class="btn-icon" onclick="usePreset('${p.id}')"><i class="fas fa-plus"></i></button></div></div>`).join('');
    }

    // ---------- CRUD ----------
    window.toggleAlarm = (id) => { let i = alarms.findIndex(a=>a.id===id); if(i>=0) { alarms[i].enabled = !alarms[i].enabled; renderAlarms(); saveToStorage(); checkNextAlarm(); } };
    window.deleteAlarm = (id) => { alarms = alarms.filter(a=>a.id!==id); renderAlarms(); saveToStorage(); checkNextAlarm(); };
    window.editAlarm = (id) => {
      let a = alarms.find(a=>a.id===id); if(!a) return;
      editingId = id; let [h,m] = a.time.split(':'); document.getElementById('alarmHour').value = +h; document.getElementById('alarmMinute').value = +m;
      document.getElementById('alarmPeriod').value = a.period; document.getElementById('alarmLabel').value = a.label;
      document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
      a.days.forEach(d => document.querySelector(`.day-btn[data-day="${d}"]`).classList.add('active'));
      document.getElementById('modalTitle').innerText = '✏️ EDIT ALARM'; document.getElementById('alarmModal').style.display = 'flex';
    };
    window.usePreset = (id) => {
      let p = presets.find(p=>p.id===id); if(p) { alarms.push({ ...p, id: Date.now()+''+Math.random(), enabled:true }); renderAlarms(); saveToStorage(); checkNextAlarm(); }
    };
    let editingId = null;
    window.openAddModal = () => {
      editingId=null; document.getElementById('alarmHour').value=7; document.getElementById('alarmMinute').value=0; document.getElementById('alarmPeriod').value='AM';
      document.getElementById('alarmLabel').value='New Alarm'; document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('modalTitle').innerText = '➕ ADD ALARM'; document.getElementById('alarmModal').style.display = 'flex';
    };
    window.closeModal = () => { document.getElementById('alarmModal').style.display = 'none'; };
    window.saveAlarm = () => {
      let hour = document.getElementById('alarmHour').value.padStart(2,'0'); let min = document.getElementById('alarmMinute').value.padStart(2,'0');
      const period = document.getElementById('alarmPeriod').value; const label = document.getElementById('alarmLabel').value;
      const days = Array.from(document.querySelectorAll('.day-btn.active')).map(b=>parseInt(b.dataset.day));
      if(days.length===0) { alert('Select at least one day'); return; }
      const alarmData = { id: editingId || Date.now().toString(), time:`${hour}:${min}`, period, label, days, enabled:true, snooze:5 };
      if(editingId) alarms = alarms.map(a=>a.id===editingId ? alarmData : a); else alarms.push(alarmData);
      renderAlarms(); saveToStorage(); checkNextAlarm(); closeModal();
    };

    document.querySelectorAll('.day-btn').forEach(b=>b.addEventListener('click', function(){ this.classList.toggle('active'); }));

    // ---------- CLOCK + ALARM TRIGGER ----------
    function updateClock() {
      const n = new Date();
      let h = n.getHours().toString().padStart(2,'0'), m = n.getMinutes().toString().padStart(2,'0'), s = n.getSeconds().toString().padStart(2,'0');
      document.getElementById('liveTime').innerText = `${h}:${m}`;
      document.getElementById('currentTime').innerText = `${h}:${m}:${s}`;
      document.getElementById('currentDate').innerText = n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      document.getElementById('footerClock').innerText = n.toLocaleTimeString();
      checkAlarms(n);
    }
    setInterval(updateClock,1000); updateClock();

    const triggerLog = {};
    function checkAlarms(now) {
      const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), day = now.getDay();
      alarms.filter(a=>a.enabled).forEach(a => {
        if(!a.days.includes(day)) return;
        let [ah, am] = a.time.split(':').map(Number);
        if(a.period==='PM' && ah!==12) ah+=12; if(a.period==='AM' && ah===12) ah=0;
        if(ah===h && am===m && s<3) {
          let key = a.id+now.toDateString();
          if(triggerLog[key] && Date.now()-triggerLog[key] < 60000) return;
          triggerLog[key] = Date.now();
          triggerAlarm(a);
        }
      });
    }

    let activeAlarm = null; let snoozeTimer = null;
    function triggerAlarm(alarm) {
      if(activeAlarm) { setTimeout(()=>triggerAlarm(alarm), 15000); return; }
      activeAlarm = alarm;
      document.getElementById('alertTitle').innerHTML = '🔊 ALARM!';
      document.getElementById('alertMessage').innerText = `${alarm.label} · ${alarm.time} ${alarm.period}`;
      document.getElementById('alarmAlert').style.display = 'flex';
      playSelectedAlarm();
      if('Notification' in window && Notification.permission==='granted') {
        new Notification('⏰ ALARM SYSTEM', { body: alarm.label+' '+alarm.time+' '+alarm.period, requireInteraction: true });
      }
    }
    window.dismissAlarm = () => { document.getElementById('alarmAlert').style.display = 'none'; stopAlarmSound(); if(snoozeTimer) clearTimeout(snoozeTimer); activeAlarm = null; };
    window.snoozeAlarm = (mins) => {
      if(!activeAlarm) return; document.getElementById('alarmAlert').style.display = 'none'; stopAlarmSound();
      if(snoozeTimer) clearTimeout(snoozeTimer);
      snoozeTimer = setTimeout(() => { if(activeAlarm) triggerAlarm(activeAlarm); }, mins*60*1000);
      activeAlarm = null;
    };

    function checkNextAlarm() {
      let now = new Date(); let next = null; let minDiff = Infinity;
      alarms.filter(a=>a.enabled).forEach(a => {
        a.days.forEach(d => {
          let cand = new Date(); let diffDays = (d - now.getDay() + 7) % 7;
          cand.setDate(now.getDate() + diffDays);
          let [hour,min] = a.time.split(':').map(Number);
          if(a.period==='PM' && hour!==12) hour+=12; if(a.period==='AM' && hour===12) hour=0;
          cand.setHours(hour, min, 0, 0);
          if(diffDays===0 && cand<=now) cand.setDate(cand.getDate()+7);
          let diff = cand-now;
          if(diff>0 && diff<minDiff) { minDiff = diff; next = a.time+' '+a.period; }
        });
      });
      document.getElementById('nextAlarm').innerText = next || '--:--';
    }

    // drag reorder
    let draggedItem = null;
    document.addEventListener('dragstart', e=>{ if(e.target.classList.contains('alarm-item')) { draggedItem=e.target; e.target.style.opacity='0.5'; } });
    document.addEventListener('dragend', e=>{ if(e.target.classList.contains('alarm-item')) e.target.style.opacity='1'; });
    document.addEventListener('dragover', e=>e.preventDefault());
    document.addEventListener('drop', e=>{
      e.preventDefault();
      if(draggedItem && e.target.closest('.alarm-item')) {
        let target = e.target.closest('.alarm-item');
        let draggedId = draggedItem.dataset.id, targetId = target.dataset.id;
        if(draggedId && targetId && draggedId!==targetId) {
          let i1 = alarms.findIndex(a=>a.id===draggedId), i2 = alarms.findIndex(a=>a.id===targetId);
          if(i1>=0 && i2>=0) { let [removed] = alarms.splice(i1,1); alarms.splice(i2,0,removed); renderAlarms(); saveToStorage(); }
        }
      }
    });

    // quick add
    document.getElementById('quickTime').addEventListener('keypress', (e)=>{
      if(e.key==='Enter') {
        let v = e.target.value.trim(); if(!/^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/.test(v)) return;
        let [h,mi] = v.split(':'); let hour12 = ((parseInt(h)+11)%12+1).toString().padStart(2,'0');
        let per = parseInt(h)>=12 ? 'PM' : 'AM';
        document.getElementById('alarmHour').value = hour12; document.getElementById('alarmMinute').value = mi;
        document.getElementById('alarmPeriod').value = per; document.getElementById('alarmLabel').value = 'Quick';
        document.querySelectorAll('.day-btn').forEach(b=>b.classList.toggle('active', [1,2,3,4,5].includes(+b.dataset.day)));
        openAddModal();
      }
    });

    // init
    loadFromStorage(); renderAlarms(); renderPresets(); checkNextAlarm();
    if('Notification' in window && Notification.permission==='default') document.getElementById('permissionBanner').style.display = 'flex';

    // expose globals
    window.toggleAlarm = toggleAlarm; window.deleteAlarm = deleteAlarm; window.editAlarm = editAlarm; window.usePreset = usePreset;
    window.openAddModal = openAddModal; window.closeModal = closeModal; window.saveAlarm = saveAlarm; window.dismissAlarm = dismissAlarm;
    window.snoozeAlarm = snoozeAlarm; window.requestFullPermissions = requestFullPermissions;
  })();
  
</script>
  
</body>
  
</html>
